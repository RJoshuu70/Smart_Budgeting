[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.bcmath", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.curl", "php83Extensions.dom", "php83Extensions.session", "composer_2"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache",
  "chmod -R a+rw storage"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=CategorySeeder --force && php artisan optimize && php -S 0.0.0.0:${PORT:-8080} server.php"